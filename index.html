<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Berri Client</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

  body {
    display: flex;
    height: 100vh;
    background: linear-gradient(135deg, #3a3aff, #8a2be2);
    color: #fff;
    overflow: hidden;
    transition: background 0.3s;
  }

  /* Sidebar */
  .sidebar {
    width: 60px;
    background: rgba(20,20,40,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0;
    transition: width 0.3s;
    overflow: hidden;
  }

  .sidebar.expanded { width: 220px; }

  .sidebar h2 {
    margin-bottom: 20px;
    text-align: center;
    font-size: 18px;
  }

  .sidebar button {
    width: 90%;
    margin: 10px 0;
    padding: 12px;
    background: #1f1f3a;
    border: none;
    color: #fff;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.3s;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sidebar button:hover { background: #2a2a5a; transform: translateX(5px); }

  /* Content */
  .content {
    flex: 1;
    padding: 30px;
    position: relative;
  }

  /* Panels */
  .panel {
    position: absolute;
    top: 20px;
    left: 20px;
    right: 20px;
    bottom: 20px;
    background: rgba(30,30,60,0.9);
    border-radius: 12px;
    padding: 20px;
    display: none;
    flex-direction: column;
    gap: 15px;
    overflow-y: auto;
    transition: all 0.3s;
  }

  .panel.active { display: flex; }

  .panel h1 { margin-bottom: 15px; font-size: 24px; }

  .panel button {
    width: fit-content;
    background: #3a3aff;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .panel button:hover { transform: scale(1.05); }

  /* Themes */
  .theme-blue { background: #0a0a2a; }
  .theme-yellow { background: #2a2a00; }
  .theme-red { background: #2a0000; }
  .theme-orange { background: #2a1400; }
  .theme-black { background: #000; }
  .theme-default { background: linear-gradient(135deg, #3a3aff, #8a2be2); }
</style>
</head>
<body class="theme-default">

<div class="sidebar" id="sidebar">
  <h2>🫐 Berri</h2>
  <button onclick="toggleSidebar()">☰</button>
  <button onclick="openPanel('versions')">Versions</button>
  <button onclick="openPanel('mods')">Mods</button>
  <button onclick="openPanel('themes')">Themes</button>
</div>

<div class="content">
  <div id="versions" class="panel active">
    <h1>Select Version</h1>
    <button onclick="launchVersion('versions/1.5.2.html')">1.5.2</button>
    <button onclick="launchVersion('versions/1.8.8.html')">1.8.8</button>
    <button onclick="launchVersion('versions/1.12.html')">1.12</button>
  </div>

  <div id="mods" class="panel">
    <h1>Mods</h1>
    <button onclick="openMods()">Open Mod Site</button>
    <p>🚧 Mod Launcher: Work in Progress</p>
  </div>

  <div id="themes" class="panel">
    <h1>Themes</h1>
    <button onclick="setTheme('default')">Default</button>
    <button onclick="setTheme('blue')">Blue</button>
    <button onclick="setTheme('yellow')">Yellow</button>
    <button onclick="setTheme('red')">Red</button>
    <button onclick="setTheme('orange')">Orange</button>
    <button onclick="setTheme('black')">Black</button>
  </div>
</div>

<script>
  function openPanel(id){
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function launchVersion(path){
    window.location.href = path;
  }

  function openMods(){
    window.open("https://eaglerrinth.github.io/", "_blank");
  }

  function setTheme(theme){
    document.body.className = "theme-" + theme;
    localStorage.setItem("berri-theme", theme);
  }

  window.onload = ()=>{
    let saved = localStorage.getItem("berri-theme");
    if(saved) document.body.className = "theme-" + saved;
  }

  function toggleSidebar(){
    document.getElementById('sidebar').classList.toggle('expanded');
  }
</script>

</body>
</html>
